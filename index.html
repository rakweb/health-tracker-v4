<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.web href="./icons/iconpple-touch-icon" href="./icons/icon-192.png".css

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.t.umd.min.js</script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <!-- ===================================================
       THEME VARIABLES (SAFE)
  =================================================== -->
  <style>
    :root{
      --bg:#0b1220; --panel:#121a2a; --muted:#8aa0c3; --text:#e6eefc;
      --accent:#4ba3ff; --danger:#ff5c5c; --warn:#ffcc66; --ok:#27d79b;
      --ring:#2a3a58; --chip:#1a2440; --btn:#1a2842; --btn-hover:#223152; --card:#0e1628;
      --input-bg:#0c1426;
    }
    [data-theme="light"]{
      --bg:#f6f8fb; --panel:#ffffff; --muted:#5a6b8a; --text:#0b1220;
      --accent:#2563eb; --danger:#dc2626; --warn:#d97706; --ok:#059669;
      --ring:#d6deeb; --chip:#eef2ff; --btn:#eef2ff; --btn-hover:#e0e7ff; --card:#ffffff;
      --input-bg:#ffffff;
    }
    body{
      margin:0;
      font-family:Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    input, select, textarea{
      background:var(--input-bg);
      color:var(--text);
      border:1px solid var(--ring);
    }
  </style>
</head>

<body>

<header>
  <div class="wrap headbar">
    <h1>Health Tracker</h1>
    <div>
      <button id="btnTheme" class="btn" aria-label="Toggle theme">🌙</button>
      <button id="btnInstall" class="btn" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
    </div>
  </div>
</header>

<!-- ✅ YOUR ORIGINAL MAIN CONTENT REMAINS HERE UNCHANGED -->
<!-- (KPIs, Entries, Chart, Modals, Forms etc. should stay exactly as before) -->

<!-- Update toast -->
<div id="updateToast" class="toast" role="alert" aria-live="assertive">
  <span>New version available.</span>
  <button id="btnReloadNow" class="btn ok">Reload</button>
  <button id="btnDismissToast" class="btn">Later</button>
</div>

<!-- Theme toggle (SAFE, no app dependencies) -->
<script>
(function(){
  const root=document.documentElement;
  const btn=document.getElementById('btnTheme');
  const saved=localStorage.getItem('theme')||'dark';
  apply(saved);
  btn.onclick=()=>apply(root.dataset.theme==='dark'?'light':'dark');
  function apply(t){
    root.dataset.theme=t;
    btn.textContent=t==='dark'?'🌙':'☀️';
    localStorage.setItem('theme',t);
  }
})();
</script>

<!-- Update check -->
<script>
(function(){
  const CURRENT_VERSION="1.4.0";
  async function check(manual=false){
    try{
      const r=await fetch('/version.json',{cache:'no-store'});
      if(!r.ok) return;
      const j=await r.json();
      if(j.version && j.version!==CURRENT_VERSION){
        updateToast.classList.add('show');
      }else if(manual){
        alert('You are on the latest version.');
      }
    }catch(e){
      if(manual) alert('Update check failed.');
    }
  }
  btnCheckUpdates.onclick=()=>check(true);
  btnReloadNow.onclick=()=>location.reload();
  btnDismissToast.onclick=()=>updateToast.classList.remove('show');
  window.addEventListener('load',()=>setTimeout(check,1200));
})();
</script>

<!-- Install prompt -->
<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  btnInstall.style.display='inline-block';
});
btnInstall.onclick=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  btnInstall.style.display='none';
};
</script>

<!-- ✅ REQUIRED APP SCRIPTS -->
<script src="./range-slider.js" defer></script>
<script src="./app.js" defer></script>

</body>
</html>
