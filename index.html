<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:#0b1220;
      --text:#e6eefc;
      --btn:#1a2842;
    }
    [data-theme="light"] {
      --bg:#f6f8fb;
      --text:#0b1220;
      --btn:#e0e7ff;
    }
    body {
      margin:0;
      padding:16px;
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    button {
      background:var(--btn);
      color:var(--text);
      border:none;
      padding:8px 12px;
      cursor:pointer;
      margin-right:8px;
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }
    th, td {
      border-bottom:1px solid #444;
      padding:6px;
      text-align:left;
    }
  </style>
</head>

<body>
  <h1>Health Tracker v4</h1>

  <div>
    <button id="btnTheme">Toggle Theme</button>
    <button id="btnAdd">Add Entry</button>
    <button id="btnRefresh">Refresh</button>
  </div>

  <table>
    <thead>
      <tr><th>Date</th><th>Glucose</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <canvas id="metricsChart" height="120"></canvas>

  <!-- app.js MUST be last -->
  <script src="./app.js"></script>
</body>
</html>
