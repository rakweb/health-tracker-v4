<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:#0b1220;
      --text:#e6eefc;
      --btn:#1a2842;
    }
    [data-theme="light"] {
      --bg:#f6f8fb;
      --text:#0b1220;
      --btn:#e0e7ff;
    }
    body {
      margin:0;
      padding:16px;
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    button {
      background:var(--btn);
      color:var(--text);
      border:none;
      padding:8px 12px;
      cursor:pointer;
      margin-right:8px;
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }
    th, td {
      border-bottom:1px solid #444;
      padding:6px;
      text-align:left;
    }
	/* ================= TOP CONTROL CARD ================= */

.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid #2a3a58;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
}

.card-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.card-row:last-child {
  margin-bottom: 0;
}

.card-row.center {
  justify-content: center;
}

.card-row > div {
  display: flex;
  flex-direction: column;
  min-width: 140px;
}

label {
  font-size: 12px;
  opacity: 0.75;
  margin-bottom: 4px;
}

select,
input[type="date"] {
  padding: 6px 8px;
}
  </style>
</head>

<body>
  <h1>Health Tracker v4</h1>

  <div class="card" id="topControls">

  <!-- Row 1: Filters & View Controls -->
  <div class="card-row">
    <div>
      <label for="filterStart">From Date</label>
      <input type="date" id="filterStart">
    </div>

    <div>
      <label for="filterEnd">To Date</label>
      <input type="date" id="filterEnd">
    </div>

    <div>
      <label for="chartMetrics">Chart Metrics</label>
      <select id="chartMetrics">
        <option value="glucose">Glucose</option>
      </select>
    </div>

    <div>
      <label for="axisMode">Axis Mode</label>
      <select id="axisMode">
        <option value="single">Single Axis</option>
        <option value="multi">Per Metric</option>
      </select>
    </div>

    <div>
      <label for="toggleChart">Show Metric Chart</label>
      <select id="toggleChart">
        <option value="on">On</option>
        <option value="off">Off</option>
      </select>
    </div>

    <div>
      <label for="viewMode">View</label>
      <select id="viewMode">
        <option value="both">Table + Chart</option>
        <option value="table">Table Only</option>
        <option value="chart">Chart Only</option>
      </select>
    </div>
  </div>

  <!-- Row 2: Data Actions -->
  <div class="card-row center">
    <button id="btnAdd">Add Entry</button>
    <button id="btnRefresh">Refresh</button>
    <button id="btnFields">Select Fields</button>
    <button id="btnThresholds">Thresholds</button>
    <button id="btnSaveCSV">Save CSV</button>
    <button id="btnSavePDF">Save PDF</button>
    <button id="btnImportCSV">Import CSV</button>
    <input type="file" id="importFile" accept=".csv" hidden>
	<button id="btnOptions">Options</button>
    <button id="btnTheme">Toggle Theme</button>
  </div>
  </div>

</div>

  <table>
    <thead>
      <tr><th>Date</th><th>Glucose</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <canvas id="metricsChart" height="120"></canvas>

  <!-- app.js MUST be last -->
  <script src="./app.js"></script>
</body>
</html>
