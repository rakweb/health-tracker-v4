<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- PWA -->
  ./manifest.webmanifest
  ./icons/icon-192.png

  <!-- Chart.js (MUST be script tag) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js   :root {
      --bg: #0b1220;
      --text: #e6eefc;
      --btn: #1a2842;
    }
    [data-theme="light"] {
      --bg: #f6f8fb;
      --text: #0b1220;
      --btn: #e0e7ff;
    }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
    }
    button {
      background: var(--btn);
      color: var(--text);
      border: none;
      padding: 8px 12px;
      margin-right: 8px;
      cursor: pointer;
    }
    table {
      width: 100%;
      margin-top: 12px;
      border-collapse: collapse;
    }
    td, th {
      border-bottom: 1px solid #444;
      padding: 6px;
    }
  </style>
</head>

<body>
  <h1>Health Tracker</h1>

  <div>
    <button id="btnTheme">Toggle Theme</button>
    <button id="btnAdd">Add Entry</button>
    <button id="btnRefresh">Refresh</button>
  </div>

  <table>
    <thead>
      <tr><th>Date</th><th>Glucose</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <canvas id="metricsChart" height="120"></canvas>

  <!-- app.js MUST be a script tag -->
  </app.js</script>
</body>
</html>
