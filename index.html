<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker v4.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./range-slider.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

<style>
  :root {
    /* Dark Theme (default) */
    --bg: #0b1220;
    --panel: #121a2a;
    --muted: #8aa0c3;
    --text: #e6eefc;
    --accent: #4ba3ff;
    --danger: #ff5c5c;
    --warn: #ffcc66;
    --ok: #27d79b;
    --ring: #2a3a58;
    --chip: #1a2440;
    --btn: #1a2842;
    --btn-hover: #223152;
    --card: #0e1628;
    --success: #27d79b;
    --border: #1f2a45;
  }

  [data-theme="light"] {
    /* Complete Light Theme */
    --bg: #f8f9fc;
    --panel: #ffffff;
    --muted: #555a6e;
    --text: #1f2537;
    --accent: #0066cc;
    --danger: #d32f2f;
    --warn: #f57c00;
    --ok: #2e7d32;
    --ring: #c0c8e0;
    --chip: #e8ecf8;
    --btn: #f0f2fa;
    --btn-hover: #e0e4f0;
    --card: #ffffff;
    --success: #2e7d32;
    --border: #d0d7e8;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #0a1120 0%, #0b1220 60%, #0d1322 100%);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }
  [data-theme="light"] body {
    background: linear-gradient(180deg, #f0f2fa 0%, #f8f9fc 60%, #e8ecf8 100%);
  }

  /* Rest of your original styles (toolbar, cards, kpis, modals, etc.) – kept intact but with var() usage */
  .card { background: var(--card); border: 1px solid var(--ring); }
  .btn { background: var(--btn); border: 1px solid var(--ring); color: var(--text); }
  .btn:hover { background: var(--btn-hover); }
  input, select, textarea {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Accessibility enhancements */
  button, input, select { min-height: 44px; }
  :focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker <span id="versionBadge" class="small">v4.3</span></h1>
    </div>
    <div class="install toolbar">
      <button id="btnInstall" class="btn" aria-label="Install as PWA" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn" aria-label="Check for app updates">Check Updates</button>
      <button id="themeToggle" class="btn" aria-label="Toggle dark/light theme" title="Toggle theme">🌙</button>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- Your existing toolbar, KPIs, Risk Alerts, Entries Table, Chart – unchanged except added ARIA -->
  <div class="toolbar card" role="toolbar" aria-label="Main controls">
    <!-- ... your row buttons ... -->
  </div>

  <!-- KPIs with better labels -->
  <div class="kpis" role="region" aria-label="Key health indicators"></div>

  <!-- Entries -->
  <div class="card full-width" id="entriesCard" role="region" aria-labelledby="entriesTitle">
    <h2 id="entriesTitle">Entries</h2>
    <table id="entriesTable" aria-label="Health entries log"></table>
  </div>

  <!-- Chart -->
  <div class="card full-width" id="chartCard" role="region" aria-labelledby="chartTitle">
    <h2 id="chartTitle">Metrics Chart</h2>
    <canvas id="metricsChart" aria-label="Health metrics line chart" role="img"></canvas>
  </div>
</main>

<!-- All your modals remain the same but with added ARIA where needed -->

<!-- Update Toast -->
<div id="updateToast" class="toast" role="alert" aria-live="polite">
  <span id="updateMessage"></span>
  <button id="btnReloadNow" class="btn ok">Reload Now</button>
  <button id="btnDismissToast" class="btn">Later</button>
</div>

<script src="./range-slider.js"></script>
<script src="./app.js" defer></script>
</body>
</html>
