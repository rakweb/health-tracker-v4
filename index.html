<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- =========================
       PWA
  ========================== -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- =========================
       Libraries
  ========================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <link rel="stylesheet" href="./range-slider.css" />

<!-- =========================================================
     THEME VARIABLES
========================================================= -->
<style>
:root{
  --bg:#0b1220; --panel:#121a2a; --muted:#8aa0c3; --text:#e6eefc;
  --accent:#4ba3ff; --danger:#ff5c5c; --warn:#ffcc66; --ok:#27d79b;
  --ring:#2a3a58; --chip:#1a2440; --btn:#1a2842; --btn-hover:#223152; --card:#0e1628;
}

[data-theme="light"]{
  --bg:#f6f8fb; --panel:#ffffff; --muted:#5a6b8a; --text:#0b1220;
  --accent:#2563eb; --danger:#dc2626; --warn:#d97706; --ok:#059669;
  --ring:#d6deeb; --chip:#eef2ff; --btn:#eef2ff; --btn-hover:#e0e7ff; --card:#ffffff;
}

*{ box-sizing:border-box }

body{
  margin:0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg));
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  z-index:30;
  backdrop-filter: blur(8px);
  background:rgba(9,13,24,.7);
  border-bottom:1px solid var(--ring);
}

.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:12px 16px;
}

h1{ margin:6px 0; font-size:20px; font-weight:700 }
h2{ margin:0 }

.small{ font-size:12px; color:var(--muted) }

.btn{
  background:var(--btn);
  border:1px solid var(--ring);
  color:var(--text);
  border-radius:10px;
  padding:9px 12px;
  font-size:14px;
  cursor:pointer;
}
.btn:hover{ background:var(--btn-hover) }
.btn.ok{ background:#113c2d }
.btn.warn{ background:#453312 }
.btn.danger{ background:#3a1216 }

.card{
  background:var(--card);
  border:1px solid var(--ring);
  border-radius:14px;
  padding:12px;
  margin-top:12px;
  box-shadow:0 4px 25px rgba(0,0,0,.4);
}

.row{ display:flex; gap:8px; flex-wrap:wrap }
.row> *{ flex:1 1 160px; min-width:160px }

label{ display:block; font-size:12px; color:var(--muted); margin:6px 0 4px }

input, select, textarea{
  width:100%;
  background:#0c1426;
  color:var(--text);
  border:1px solid var(--ring);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  border:1px solid var(--ring);
}
th, td{
  padding:8px;
  border-bottom:1px solid var(--ring);
}
thead{ background:#0a1426 }

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
@media(max-width:768px){
  .kpis{ grid-template-columns:repeat(2,1fr) }
}

.kpi{
  border:1px solid var(--ring);
  border-radius:12px;
  padding:10px;
}

.toast{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:var(--panel);
  border:1px solid var(--ring);
  border-radius:12px;
  padding:10px 12px;
  display:none;
  gap:8px;
  align-items:center;
  z-index:100;
}
.toast.show{ display:flex }
</style>
</head>

<body>
<header role="banner">
  <div class="wrap row" style="justify-content:space-between;align-items:center">
    <h1>Health Tracker</h1>
    <div class="row" style="align-items:center">
      <button id="btnTheme" class="btn" aria-label="Toggle theme">🌙</button>
      <button id="btnInstall" class="btn" hidden>Install</button>
      <button id="btnCheckUpdates" class="btn">Check updates</button>
    </div>
  </div>
</header>

<main class="wrap" role="main">

  <!-- KPIs -->
  <section class="kpis" aria-label="Key health indicators">
    <div class="kpi"><div class="small">Glucose</div><div id="kpiGlucose">—</div></div>
    <div class="kpi"><div class="small">Blood Pressure</div><div id="kpiBP">—</div></div>
    <div class="kpi"><div class="small">BMI / WHtR</div><div><span id="kpiBMI">—</span> / <span id="kpiWHtR">—</span></div></div>
    <div class="kpi"><div class="small">SpO₂ / HR</div><div><span id="kpiSpO2">—</span> / <span id="kpiHR">—</span></div></div>
  </section>

  <!-- Entries -->
  <section class="card" aria-label="Entries">
    <h2>Entries</h2>
    <div style="overflow:auto">
      <table id="entriesTable" role="table">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- Chart -->
  <section class="card" aria-label="Metrics chart">
    <h2>Metrics Chart</h2>
    <canvas id="metricsChart" height="320"></canvas>
  </section>

</main>

<!-- ========================
     UPDATE TOAST
======================== -->
<div id="updateToast" class="toast" role="alert" aria-live="assertive">
  <span>New version available.</span>
  <button id="btnReloadNow" class="btn ok">Reload</button>
  <button id="btnDismissToast" class="btn">Later</button>
</div>

<script>
/* ================= THEME ================= */
(()=> {
  const root=document.documentElement,btn=btnTheme;
  const saved=localStorage.getItem('theme')||'dark';
  set(saved);
  btn.onclick=()=>set(root.dataset.theme==='dark'?'light':'dark');
  function set(m){ root.dataset.theme=m; btn.textContent=m==='dark'?'🌙':'☀️'; localStorage.setItem('theme',m); }
})();

/* ================= UPDATES ================= */
(async()=>{
  const CURRENT="1.4.0";
  async function check(manual=false){
    try{
      const r=await fetch('/version.json',{cache:'no-store'});
      if(!r.ok) return;
      const {version}=await r.json();
      if(version!==CURRENT) updateToast.classList.add('show');
      else if(manual) alert('You are up to date.');
    }catch(e){ if(manual) alert('Update check failed.'); }
  }
  btnCheckUpdates.onclick=()=>check(true);
  btnReloadNow.onclick=()=>location.reload();
  btnDismissToast.onclick=()=>updateToast.classList.remove('show');
  window.addEventListener('load',()=>setTimeout(check,1500));
})();

/* ================= INSTALL ================= */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  btnInstall.hidden=false;
});
btnInstall.onclick=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  btnInstall.hidden=true;
};
</script>

<script src="./range-slider.js"></script>
<script src="./app.js" defer></script>
</body>
</html>
